<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Lanchonete</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        margin: 0;
        background: #e60000;
      }

      /* APP */
      .app {
        width: 100%;
        max-width: 95%; /* AUMENTEI AQUI */
        min-height: 100vh;
        margin: 0 auto;
        padding: 30px 20px; /* MAIS ESPAÇO */
        text-align: center;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      /* TOPO */
      .topo {
        margin-bottom: 2.5em;
      }

      .topo p {
        color: #fff;
        font-size: 1.5em;
        margin-top: 5px;
      }

      /* CARD */
      .card {
        display: flex;
        flex-direction: column;
        justify-content: center;

        background: #fff;
        border: 3px solid #000;
        border-radius: 15px;
        text-align: left;

        padding: 38px;
        margin-top: 2em;
        width: 52em;
      }

      .card h2 {
        margin-bottom: 0px;
        font-size: 3.5em;
      }

      .sub {
        font-size: 1.5em;
        color: #555;
        margin-bottom: 40px;
      }

      /* BOTÃO */
      .google-btn {
        width: 100%;
        padding: 22px;
        border-radius: 10px;
        border: 2px solid #ccc;
        background: #f5f5f5;
        font-weight: bold;
        font-size: 16px;

        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;

        cursor: pointer;
      }

      /* REMOVE MARGEM DO <p> DENTRO DO BOTÃO */
      .google-btn p {
        margin: 0;
      }

      .google-btn:hover {
        background: #eee;
      }

      .enter-google {
        font-size: 30px;
      }

      /* RODAPÉ */
      .rodape {
        margin-top: 60px;
        font-size: 1.5em;
        color: black;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topo">
        <img style="height: 10em" src="img/logo-login.png" alt="" />
        <p>Faça seu pedido agora</p>
      </div>

      <div class="card">
        <h2>Bem-vindo</h2>
        <p class="sub">Faça login com sua conta Google</p>

        <button class="google-btn" onclick="loginGoogle()">
          <img style="height: 2.8em" src="img/icons/logo-google.png" alt="" />
          <p class="enter-google">Entrar com Google</p>
        </button>

        <p class="rodape">Retirada ou consumo no local • Sem entregas</p>
      </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <!-- <script src="js/login.js"></script> -->
  </body>
</html>
