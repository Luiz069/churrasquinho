<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-[#070302] text-white selection:bg-orange-600 selection:text-white">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Churrasquinho Durans - Portal Premium</title>
  <!-- Tailwind CSS para utilitários modernos e responsividade -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Montserrat para títulos robustos e Inter para inputs legíveis -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800;900&display=swap"
    rel="stylesheet">
  <!-- FontAwesome para ícones premium nos inputs -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #070302;
      -webkit-tap-highlight-color: transparent;
    }

    h1,
    h2,
    .font-title {
      font-family: 'Montserrat', sans-serif;
    }

    /* Brilho de Brasa Viva na Logo conforme anexo 1 (image_4a8aa6.png) */
    .glow-avatar-ring {
      box-shadow: 0 0 35px rgba(249, 115, 22, 0.55), inset 0 0 15px rgba(249, 115, 22, 0.3);
      border: 2px solid rgba(249, 115, 22, 0.8);
    }

    /* Botão premium com gradiente de brasa quente */
    .glow-button {
      background: linear-gradient(90deg, #ea580c 0%, #f59e0b 100%);
      box-shadow: 0 4px 25px rgba(234, 88, 12, 0.5);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glow-button:hover {
      box-shadow: 0 6px 35px rgba(249, 115, 22, 0.75);
      transform: translateY(-1.5px);
    }

    .glow-button:active {
      transform: translateY(1px);
    }

    /* Transição suave para a revelação do campo de nome */
    .transition-height-custom {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Fundo Radial com tom de carvão e calor central */
    .bg-gradient-bbq {
      background: radial-gradient(circle at center, #3a1505 0%, #0c0502 70%, #030100 100%);
    }

    /* Estilização Premium do Card com transparência escura */
    .bg-gradient-panel {
      background: linear-gradient(135deg, rgba(20, 10, 6, 0.94) 0%, rgba(10, 5, 3, 0.98) 100%);
    }

    /* Pulsação de brasa quente na logo central */
    @keyframes heatPulse {

      0%,
      100% {
        transform: scale(1);
        filter: brightness(1);
      }

      50% {
        transform: scale(1.03);
        filter: brightness(1.2) drop-shadow(0 0 25px rgba(249, 115, 22, 0.6));
      }
    }

    .heat-animation {
      animation: heatPulse 4s infinite ease-in-out;
    }

    /* ANIMAÇÃO DE PULSAÇÃO DA BRASA NO BACKGROUND */
    @keyframes brasaBreathe {

      0%,
      100% {
        opacity: 0.4;
        transform: scale(1);
        filter: saturate(1) brightness(0.9);
      }

      50% {
        opacity: 0.75;
        transform: scale(1.03);
        filter: saturate(1.4) brightness(1.25);
      }
    }

    .brasa-breathing-bg {
      animation: brasaBreathe 7s infinite ease-in-out;
    }

    /* Esconder scrollbars desnecessárias */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="h-full overflow-hidden relative bg-gradient-bbq flex items-center justify-center">

  <!-- CAMADA 1: Textura Realista de Brasa Quente (image_4a8a82.jpg) com efeito pulsante -->
  <div
    class="absolute inset-0 z-0 bg-cover bg-center mix-blend-screen opacity-50 pointer-events-none brasa-breathing-bg"
    style="background-image: url('image_4a8a82.jpg');">
  </div>

  <!-- CAMADA 2: Círculo de Brilho / Aura Dourada Centralizada (image_4a8aa6.png) -->
  <div class="absolute inset-0 z-0 bg-cover bg-center mix-blend-screen opacity-60 pointer-events-none"
    style="background-image: url('image_4a8aa6.png');">
  </div>

  <!-- CAMADA 3: Fundo de Partículas de Faíscas Interativo -->
  <canvas id="emberCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-0 opacity-80"></canvas>

  <!-- Container Central Responsivo -->
  <div
    class="h-full w-full flex flex-col justify-center items-center overflow-y-auto no-scrollbar py-8 px-4 relative z-10">

    <!-- Card de Login Integrado (Unindo sua estrutura ao visual premium do anexo 1) -->
    <div
      class="card-login w-full max-w-[440px] bg-gradient-panel border border-[#3e1f11]/60 px-6 py-8 sm:p-9 rounded-2xl shadow-2xl relative overflow-hidden transition-all duration-300"
      id="loginBox">

      <!-- Marca d'água premium de Churrasqueira Grelhando Espetinhos (Fundo do Card) -->
      <svg class="absolute inset-0 w-full h-full opacity-[0.05] pointer-events-none select-none text-orange-500"
        viewBox="0 0 200 240" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
        <!-- Suportes e Pés da Churrasqueira -->
        <path d="M 65,185 L 45,225 M 135,185 L 155,225 M 100,185 L 100,220" stroke-width="1.2" stroke-linecap="round" />
        <path d="M 55,210 L 145,210" stroke-width="1" stroke-linecap="round" />

        <!-- Corpo/Boia da Churrasqueira (Coifa de Carvão) -->
        <path d="M 50,135 L 150,135 L 138,185 L 62,185 Z" stroke-width="1.5" stroke-linejoin="round"
          fill="rgba(234, 88, 12, 0.02)" />

        <!-- Brasas incandescentes desenhadas no fundo do bojo -->
        <circle cx="75" cy="165" r="3.5" fill="currentColor" opacity="0.4" stroke="none" />
        <circle cx="125" cy="160" r="4" fill="currentColor" opacity="0.4" stroke="none" />
        <circle cx="100" cy="170" r="3" fill="currentColor" opacity="0.4" stroke="none" />
        <path d="M 70,170 L 85,160 M 115,170 L 130,160" stroke-width="0.8" />

        <!-- Grelha Superior (Linhas Horizontais e Suporte) -->
        <path d="M 45,135 L 155,135" stroke-width="2" stroke-linecap="round" />
        <path
          d="M 55,135 L 55,130 M 70,135 L 70,130 M 85,135 L 85,130 M 100,135 L 100,130 M 115,135 L 115,130 M 130,135 L 130,130 M 145,135 L 145,130"
          stroke-width="1" />

        <!-- Espetinho 1 (Esquerda - Inclinado com pedaços de carne e vegetais) -->
        <path d="M 40,125 L 115,65" stroke-width="1.2" stroke-linecap="round" />
        <!-- Pedaços do espetinho 1 -->
        <rect x="52" y="103" width="11" height="11" rx="3" transform="rotate(-38 52 103)" fill="rgba(234, 88, 12, 0.2)"
          stroke-width="1" />
        <rect x="68" y="90" width="11" height="11" rx="3" transform="rotate(-38 68 90)" fill="rgba(234, 88, 12, 0.2)"
          stroke-width="1" />
        <rect x="84" y="77" width="11" height="11" rx="3" transform="rotate(-38 84 77)" fill="rgba(234, 88, 12, 0.2)"
          stroke-width="1" />

        <!-- Espetinho 2 (Direita - Cruzado com pedaços de carne e vegetais) -->
        <path d="M 160,120 L 85,60" stroke-width="1.2" stroke-linecap="round" />
        <!-- Pedaços do espetinho 2 -->
        <rect x="137" y="98" width="11" height="11" rx="3" transform="rotate(38 137 98)" fill="rgba(234, 88, 12, 0.2)"
          stroke-width="1" />
        <rect x="121" y="85" width="11" height="11" rx="3" transform="rotate(38 121 85)" fill="rgba(234, 88, 12, 0.2)"
          stroke-width="1" />
        <rect x="105" y="72" width="11" height="11" rx="3" transform="rotate(38 105 72)" fill="rgba(234, 88, 12, 0.2)"
          stroke-width="1" />

        <!-- Linhas onduladas de fumaça e calor subindo suavemente -->
        <path d="M 65,120 C 60,100 75,90 70,70 C 68,60 72,50 68,40" stroke-width="0.8" stroke-linecap="round"
          opacity="0.8" />
        <path d="M 100,120 C 95,95 110,85 105,60 C 100,50 105,40 100,25" stroke-width="1" stroke-linecap="round"
          opacity="0.8" />
        <path d="M 135,120 C 130,100 145,90 140,70 C 138,60 142,50 138,40" stroke-width="0.8" stroke-linecap="round"
          opacity="0.8" />

        <!-- Pequenas fagulhas de brasa flutuando no ar -->
        <circle cx="80" cy="50" r="1.5" fill="currentColor" stroke="none" />
        <circle cx="120" cy="35" r="2" fill="currentColor" stroke="none" />
        <circle cx="95" cy="55" r="1" fill="currentColor" stroke="none" />
      </svg>

      <!-- Logo Area (Idêntica à sua estrutura, com visual premium do anexo 1) -->
      <div class="logo-area flex flex-col items-center text-center space-y-3 mb-6 relative z-10">
        <div class="inline-flex items-center justify-center p-[2px] rounded-full heat-animation">
          <!-- Mantém a estrutura com a classe logo-circle de forma responsiva -->
          <div
            class="logo-circle bg-[#170b08] rounded-full p-1 h-20 w-20 sm:h-24 sm:w-24 flex items-center justify-center glow-avatar-ring overflow-hidden">
            <!-- Caso possua a logo local "img/logo-03.png", ela carrega aqui. Do contrário, usa o belo SVG de brasa como fallback -->
            <img src="img/logo-03.png" alt="Logo" class="w-full h-full object-cover"
              onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">

            <!-- SVG Premium de Espeto com Brasas como Fallback de Design -->
            <svg class="w-12 h-12 sm:w-16 sm:h-16 text-orange-500 hidden" viewBox="0 0 64 64" fill="none"
              xmlns="http://www.w3.org/2000/svg">
              <path d="M18 44C22 48 30 50 32 50C34 50 42 48 46 44C42 45 34 46 32 46C30 46 22 45 18 44Z"
                fill="url(#fireGrad)" opacity="0.8" />
              <path d="M24 45C28 50 36 50 40 45C36 46 28 46 24 45Z" fill="#F59E0B" opacity="0.9" />
              <path d="M13 51L8 56C7 57 7 58 8 59C9 60 10 60 11 59L16 54" stroke="#D97706" stroke-width="3.5"
                stroke-linecap="round" />
              <line x1="15" y1="49" x2="52" y2="12" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round" />
              <rect x="20" y="36" width="10" height="10" rx="2" transform="rotate(-45 20 36)" fill="#78350F"
                stroke="#F59E0B" stroke-width="1.5" />
              <line x1="22.5" y1="39.5" x2="29.5" y2="32.5" stroke="#111827" stroke-width="2" stroke-linecap="round" />
              <rect x="32" y="24" width="10" height="10" rx="2" transform="rotate(-45 32 24)" fill="#852f0c"
                stroke="#F59E0B" stroke-width="1.5" />
              <line x1="34.5" y1="27.5" x2="41.5" y2="20.5" stroke="#111827" stroke-width="2" stroke-linecap="round" />
              <rect x="44" y="12" width="10" height="10" rx="2" transform="rotate(-45 44 12)" fill="#652307"
                stroke="#F59E0B" stroke-width="1.5" />
              <line x1="46.5" y1="15.5" x2="53.5" y2="8.5" stroke="#111827" stroke-width="2" stroke-linecap="round" />
              <defs>
                <radialGradient id="fireGrad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#EF4444" />
                  <stop offset="100%" stop-color="#78350F" stop-opacity="0" />
                </radialGradient>
              </defs>
            </svg>
          </div>
        </div>

        <div class="space-y-1">
          <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-white leading-tight">
            Churrasquinho Durans
          </h1>
          <p class="text-orange-500 text-[11px] sm:text-xs font-semibold tracking-widest uppercase">
            Sabor que conquista
          </p>
        </div>
      </div>

      <!-- Indicador Dinâmico de Passos igual ao Anexo 1 -->
      <div class="flex items-center justify-between mb-6 pb-3 border-b border-white/5 relative z-10">
        <div class="flex items-center gap-2">
          <span id="stepBadge1"
            class="h-6 w-6 rounded-full bg-orange-600 text-white flex items-center justify-center text-xs font-bold transition-all duration-300">1</span>
          <span class="text-xs font-semibold text-white">Telefone</span>
        </div>
        <div class="flex-1 h-[2px] bg-[#2d170d] mx-3 relative">
          <div id="stepProgressLine" class="absolute top-0 left-0 h-full w-0 bg-orange-500 transition-all duration-500">
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span id="stepBadge2"
            class="h-6 w-6 rounded-full bg-stone-800 text-gray-500 flex items-center justify-center text-xs font-bold transition-all duration-300">2</span>
          <span id="stepText2" class="text-xs font-semibold text-gray-500 transition-all duration-300">Nome</span>
        </div>
      </div>

      <!-- Título & Subtexto adaptados -->
      <div class="mb-5 relative z-10">
        <h2 class="text-xl sm:text-2xl font-bold text-white">Bem-vindo!</h2>
        <p class="subtexto text-gray-400 text-xs mt-1">
          Informe seu número de telefone para continuar
        </p>
      </div>

      <!-- Formulário com IDs originais preservados -->
      <form class="space-y-4 relative z-10" onsubmit="event.preventDefault();">

        <!-- TELEFONE -->
        <div class="space-y-1.5">
          <div class="flex justify-between items-center">
            <label for="telefone" class="block text-[10px] font-bold uppercase tracking-wider text-orange-500">
              NÚMERO DE TELEFONE
            </label>
            <span id="phoneOk" class="text-[10px] text-green-500 hidden items-center gap-1">
              <i class="fa-solid fa-circle-check"></i> Preenchido
            </span>
          </div>
          <div class="relative rounded-xl shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
              <i class="fa-solid fa-phone text-sm"></i>
            </div>
            <input type="text" id="telefone" placeholder="(11) 99999-9999"
              class="block w-full pl-10 pr-4 py-3 bg-[#0a0504] border border-[#3e1f11] rounded-xl text-white placeholder-stone-600 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent text-sm sm:text-base transition-all duration-200"
              oninput="mostrarNome()">
          </div>
        </div>

        <!-- NOME APARECE DEPOIS -->
        <div id="nomeArea"
          class="transition-height-custom max-h-0 opacity-0 pointer-events-none overflow-hidden scale-95 origin-top">
          <div class="space-y-1.5 pt-2">
            <label for="nome" class="block text-[10px] font-bold uppercase tracking-wider text-orange-500">
              NOME
            </label>
            <div class="relative rounded-xl shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
                <i class="fa-solid fa-user text-sm"></i>
              </div>
              <input type="text" id="nome" placeholder="Seu nome"
                class="block w-full pl-10 pr-4 py-3 bg-[#0a0504] border border-[#3e1f11] rounded-xl text-white placeholder-stone-600 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent text-sm sm:text-base transition-all duration-200">
            </div>
          </div>
        </div>

        <button type="button" id="btnSubmit" onclick="entrar()"
          class="w-full py-3 px-4 rounded-xl text-white font-bold text-sm sm:text-base transition-all duration-300 glow-button flex items-center justify-center gap-2 mt-4">
          <span>Entrar</span>
          <i class="fa-solid fa-fire text-sm animate-bounce"></i>
        </button>
      </form>
    </div>

    <!-- Rodapé do anexo 1 -->
    <div class="text-center text-[10px] text-stone-500 space-y-1 mt-6 max-w-sm px-4">
      <p>&copy; 2026 Churrasquinho Durans. O legítimo sabor da grelha.</p>
      <p>Ao continuar, você concorda com nossos termos de privacidade.</p>
    </div>

  </div>

  <!-- Controle do Chiado da Brasa -->
  <div
    class="absolute bottom-4 right-4 z-50 flex items-center gap-2 bg-black/40 backdrop-blur-md border border-white/5 px-3 py-1.5 rounded-lg text-[10px]">
    <button onclick="toggleMute()" id="btnMute"
      class="p-1 px-1.5 rounded text-gray-400 hover:text-white transition-all flex items-center gap-1.5"
      title="Sons de Feedback">
      <i class="fa-solid fa-volume-high"></i>
      <span>Som ativo</span>
    </button>
  </div>

  <!-- Toast Customizado -->
  <div id="toast"
    class="fixed bottom-16 sm:bottom-6 right-6 bg-[#140b08] border-l-4 border-orange-500 p-4 rounded-xl shadow-2xl flex items-center gap-3 transform translate-y-20 opacity-0 pointer-events-none transition-all duration-300 z-50 max-w-xs sm:max-w-sm">
    <div class="h-8 w-8 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-400">
      <i class="fa-solid fa-fire" id="toastIcon"></i>
    </div>
    <div>
      <h4 class="font-bold text-xs sm:text-sm text-white" id="toastTitle">Sucesso</h4>
      <p class="text-[11px] sm:text-xs text-gray-400" id="toastMessage">Iniciando brasa...</p>
    </div>
  </div>

  <script>
    // --- GERENCIAMENTO DE ÁUDIO (Sintetizador Web Audio API) ---
    let audioCtx = null;
    let isMuted = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playSound(isSuccess = false) {
      if (isMuted) return;
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (isSuccess) {
          // Chiado rápido de brasa aquecendo
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(180, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.3);
        } else {
          // Estalo sutil de carvão queimando
          osc.type = 'sine';
          osc.frequency.setValueAtTime(450, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.05);
          gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.05);
        }
      } catch (e) {
        console.log("AudioContext bloqueado ou aguardando interação.");
      }
    }

    function toggleMute() {
      isMuted = !isMuted;
      const btn = document.getElementById('btnMute');
      btn.innerHTML = isMuted ?
        '<i class="fa-solid fa-volume-xmark"></i><span>Som mutado</span>' :
        '<i class="fa-solid fa-volume-high"></i><span>Som ativo</span>';
    }

    // --- EXIBIÇÃO DE TOAST PERSONALIZADO ---
    function showToast(title, message, isSuccess = true) {
      const toast = document.getElementById('toast');
      const toastTitle = document.getElementById('toastTitle');
      const toastMessage = document.getElementById('toastMessage');
      const toastIcon = document.getElementById('toastIcon');

      toastTitle.innerText = title;
      toastMessage.innerText = message;

      if (isSuccess) {
        toast.classList.remove('border-red-500');
        toast.classList.add('border-orange-500');
        toastIcon.className = "fa-solid fa-fire text-orange-400";
      } else {
        toast.classList.remove('border-orange-500');
        toast.classList.add('border-red-500');
        toastIcon.className = "fa-solid fa-circle-exclamation text-red-400";
      }

      toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');

      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
      }, 4000);
    }

    // --- LÓGICA DO TELEFONE E REVELAÇÃO DO CAMPO DE NOME ---
    let isNameVisible = false;

    function mostrarNome() {
      const inputTelefone = document.getElementById('telefone');
      let value = inputTelefone.value.replace(/\D/g, "");

      playSound(false);

      if (value.length > 11) value = value.slice(0, 11);

      let maskedValue = "";
      if (value.length > 0) maskedValue += "(" + value.substring(0, 2);
      if (value.length > 2) maskedValue += ") " + value.substring(2, 7);
      if (value.length > 7) maskedValue += "-" + value.substring(7, 11);

      inputTelefone.value = maskedValue;

      const cleanLength = value.length;
      const containerNome = document.getElementById('nomeArea');
      const inputNome = document.getElementById('nome');
      const indicatorOk = document.getElementById('phoneOk');

      const stepBadge1 = document.getElementById('stepBadge1');
      const stepBadge2 = document.getElementById('stepBadge2');
      const stepText2 = document.getElementById('stepText2');
      const progressBar = document.getElementById('stepProgressLine');

      if (cleanLength >= 10) {
        indicatorOk.classList.remove('hidden');
        indicatorOk.classList.add('flex');

        progressBar.style.width = '100%';
        stepBadge2.classList.remove('bg-stone-800', 'text-gray-500');
        stepBadge2.classList.add('bg-orange-500', 'text-white');
        stepText2.classList.remove('text-gray-500');
        stepText2.classList.add('text-white');

        if (!isNameVisible) {
          playSound(true);
          containerNome.classList.remove('max-h-0', 'opacity-0', 'pointer-events-none', 'scale-95');
          containerNome.classList.add('max-h-36', 'opacity-100', 'pointer-events-auto', 'scale-100');
          inputNome.setAttribute('required', 'true');
          isNameVisible = true;
          setTimeout(() => inputNome.focus(), 250);
        }
      } else {
        indicatorOk.classList.add('hidden');
        indicatorOk.classList.remove('flex');

        progressBar.style.width = '0%';
        stepBadge2.classList.add('bg-stone-800', 'text-gray-500');
        stepBadge2.classList.remove('bg-orange-500', 'text-white');
        stepText2.classList.add('text-gray-500');
        stepText2.classList.remove('text-white');

        if (isNameVisible) {
          containerNome.classList.add('max-h-0', 'opacity-0', 'pointer-events-none', 'scale-95');
          containerNome.classList.remove('max-h-36', 'opacity-100', 'pointer-events-auto', 'scale-100');
          inputNome.removeAttribute('required');
          isNameVisible = false;
        }
      }
    }

    // --- SUBMIT DO LOGIN ---
    function entrar() {
      const telVal = document.getElementById('telefone').value;
      const nomeVal = document.getElementById('nome').value;

      if (telVal.replace(/\D/g, "").length < 10) {
        showToast("Contato Incompleto", "Por favor, digite seu telefone com DDD.", false);
        return;
      }

      if (isNameVisible && !nomeVal.trim()) {
        showToast("Nome Obrigatório", "Por favor, preencha o seu nome.", false);
        return;
      }

      playSound(true);
      const btn = document.getElementById('btnSubmit');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Entrando no braseiro...`;

      setTimeout(() => {
        showToast(
          "Acesso Liberado!",
          nomeVal ? `Bem-vindo, ${nomeVal.split(' ')[0]}!` : "Bem-vindo ao nosso cardápio premium!"
        );
        setTimeout(() => {
          btn.disabled = false;
          btn.innerHTML = originalText;
        }, 2000);
      }, 1200);
    }

    // --- MOTOR DE PARTÍCULAS (Faíscas e Fuligem subindo no fundo) ---
    const canvas = document.getElementById('emberCanvas');
    const ctx = canvas.getContext('2d');
    let sparks = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Sparkle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 120;
        this.size = Math.random() * 3.0 + 0.6;
        this.speedY = Math.random() * 1.6 + 0.6;
        this.speedX = Math.random() * 1.2 - 0.6;
        this.opacity = Math.random() * 0.85 + 0.15;
        const fireHues = [14, 20, 28, 40];
        this.hue = fireHues[Math.floor(Math.random() * fireHues.length)];
      }

      update() {
        this.y -= this.speedY;
        this.x += this.speedX + Math.sin(this.y / 60) * 0.25;
        this.opacity -= 0.0015;
        if (this.size > 0.1) this.size -= 0.0018;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 100%, 55%, 1)`;
        ctx.shadowBlur = this.size * 7;
        ctx.shadowColor = `hsla(${this.hue}, 100%, 48%, 0.95)`;
        ctx.fill();
        ctx.restore();
      }
    }

    function initEmberEngine() {
      sparks = [];
      const baseDensity = Math.floor((canvas.width * canvas.height) / 7500);
      const count = Math.min(Math.max(baseDensity, 40), 160);
      for (let i = 0; i < count; i++) {
        const s = new Sparkle();
        s.y = Math.random() * canvas.height;
        sparks.push(s);
      }
    }

    function animateCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < sparks.length; i++) {
        sparks[i].update();
        sparks[i].draw();
        if (sparks[i].y < -20 || sparks[i].opacity <= 0 || sparks[i].size <= 0.1) {
          sparks[i] = new Sparkle();
        }
      }
      requestAnimationFrame(animateCanvas);
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      initEmberEngine();
    });

    window.onload = function () {
      resizeCanvas();
      initEmberEngine();
      animateCanvas();
    };
  </script>
</body>
