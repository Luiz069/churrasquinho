<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histórico de Pedidos</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ========================================================= -->
    <!-- TOPO -->
    <header>
      <div class="topbar">
        <button onclick="voltarPagina()" class="btn-back">
          <svg class="voltar" width="45" height="45" viewBox="0 0 100 100">
            <polyline
              points="60,20 30,50 60,80"
              fill="none"
              stroke="#000"
              stroke-width="7"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <h4 class="titulo-topbar">Histórico de Pedidos</h4>

        <button onclick="voltarPagina()" class="btn-back">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="48px"
            viewBox="0 -960 960 960"
            width="40px"
            fill="#e3e3e3"
            style="margin-right: 5px"
          >
            <path
              d="M220-180h150v-250h220v250h150v-390L480-765 220-570v390Zm-60 60v-480l320-240 320 240v480H530v-250H430v250H160Zm320-353Z"
            />
          </svg>
        </button>
      </div>
    </header>

    <div class="historico-container">
      <div id="historico"></div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="js/script.js"></script>
  </body>
</html>
