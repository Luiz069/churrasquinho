<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardápio Digital - Lanchonete</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <!-- ========================================================= -->
    <!-- TOPO -->
    <header>
      <div class="topbar">
        <button onclick="voltarPagina()" class="btn-back">
          ←
        </button>
      </div>
    </header>

    <!-- ========================================================= -->
    <!-- MODAL PRODUTO -->
    <div id="modalItem" class="modal">
      <div class="modal-content">
        <div class="container-fechar">
          <button onclick="fecharModal()" class="botao-fechar">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-x"
              data-loc="client/src/components/ui/dialog.tsx:139"
            >
              <path class="x-icon" d="M18 6 6 18"></path>
              <path class="x-icon" d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>

        <h2 id="m-nome" style="color: var(--vermelho); margin: 0">Nome</h2>
        <p id="m-desc" style="color: #666; font-size: 0.9rem">Descrição</p>

        <label><b>Quantidade:</b></label>
        <div class="qtd-control" style="margin: 10px 0">
          <button class="btn-qtd" onclick="mudarQtdModal(-1)">-</button>
          <span id="m-qtd-val">1</span>
          <button class="btn-qtd" onclick="mudarQtdModal(1)">+</button>
        </div>

        <div class="adicionais-container">
          <p><b>Adicionais:</b></p>

          <div class="add-item-row">
            <span>Queijo Extra (+ R$ 3,00)</span>
            <div class="qtd-control">
              <button onclick="mudarAdd('queijo', -1)">-</button>
              <span id="qtd-add-queijo">0</span>
              <button onclick="mudarAdd('queijo', 1)">+</button>
            </div>
          </div>

          <div class="add-item-row">
            <span>Ovo Extra (+ R$ 2,00)</span>
            <div class="qtd-control">
              <button onclick="mudarAdd('ovo', -1)">-</button>
              <span id="qtd-add-ovo">0</span>
              <button onclick="mudarAdd('ovo', 1)">+</button>
            </div>
          </div>

          <div class="add-item-row">
            <span>Carne Extra (+ R$ 8,00)</span>
            <div class="qtd-control">
              <button onclick="mudarAdd('carne', -1)">-</button>
              <span id="qtd-add-carne">0</span>
              <button onclick="mudarAdd('carne', 1)">+</button>
            </div>
          </div>
        </div>

        <label><b>Observações (opcional)</b></label>
        <textarea id="m-obs" rows="2"></textarea>

        <div class="subtotal-tag">
          Subtotal: R$ <span id="m-subtotal">0,00</span>
        </div>

        <button class="btn-add-main" onclick="addAoCarrinho()">
          ✅ Adicionar ao Carrinho
        </button>
      </div>
    </div>

    <!-- ========================================================= -->
    <!-- CARDÁPIO -->
    <div class="container">
      
      <!-- ============== CATEGORIA 01 ============== -->

      <div class="categoria-box">
        <h1 style="color: var(--vermelho)">🍔 Hambúrgueres Industrial</h1>

        <div class="item">
          <div class="item-row">
            <span>X-Tudo Especial</span>
            <span>R$ 25,00</span>
          </div>

          <p style="font-size: 14px; color: #666">
            Pão, carne, queijo, presunto, ovo, bacon e salada.
          </p>

          <button
            class="btn-add-main"
            onclick="
              abrirModal(
                'X-Tudo Especial',
                25,
                'Pão, carne, queijo, presunto, ovo, bacon e salada.',
              )
            "
          >
            Adicionar
          </button>
        </div>
        
        
        
      </div>


    <!-- ========================================================= -->
    <!-- CARRINHO -->
    <div id="cartSidebar" class="cart-sidebar">
      <h2 style="color: var(--vermelho)">🛒 Seu Carrinho</h2>

      <div id="lista-carrinho"></div>

      <div style="font-size: 22px; font-weight: bold; margin: 20px 0">
        Total: R$ <span id="total-final">0,00</span>
      </div>

      <input type="text" id="c-nome" placeholder="Seu nome completo *" />
      <input type="text" id="c-numero" placeholder="Seu número *" />
      <textarea
        id="c-obs"
        placeholder="Observações gerais do pedido"
      ></textarea>

      <select id="c-pagto">
        <option value="Dinheiro">Dinheiro</option>
        <option value="Pix">Pix</option>
        <option value="Cartão">Cartão</option>
      </select>

      <button class="btn-add-main" onclick="finalizarPedido()">
        📲 Finalizar Pedido
      </button>

      <button onclick="toggleCart()">Voltar</button>
    </div>

    <div class="footer-btn">
      <button class="btn-carrinho" onclick="toggleCart()">
        🛒 Carrinho (<span id="cart-count">0</span>)
      </button>
    </div>

    <!-- ========================================================= -->
    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="/js/script.js"></script>
  </body>
</html>
